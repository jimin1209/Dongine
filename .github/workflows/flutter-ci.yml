name: Flutter CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'functions/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'functions/**'
      - '*.md'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
